[book]
authors = ["Bubbler"]
language = "ko"
multilingual = false
src = "content"
title = "Baeknote"
description = "Guide for your BOJ journey"

# uses KaTeX instead of MathJax, much better interop
[preprocessor.katex]
after = ["links"]

# converts mermaid drawings to SVG
[preprocessor.mermaid]
command = "mdbook-mermaid"

# generate table of contents
[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]

[preprocessor.baeknote-summary]
command = "python summary_gen.py"

[output]

[output.html]
additional-css = ["./utilities/custom.css"]
additional-js = ["./utilities/mermaid.min.js", "./utilities/mermaid-init.js"]
git-repository-icon = "fa-github-alt"
no-section-label = true
default-theme = "rust"
preferred-dark-theme = "navy"
cname = "baeknote.bubbler.blue"
smart-punctuation = false
git-repository-url = "https://github.com/Bubbler-4/baeknote"
edit-url-template = "https://github.com/Bubbler-4/baeknote/edit/main/{path}"

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
heading-split-level = 1
boost-paragraph = 0
teaser-word-count = 0

[output.html.print]
enable = false
